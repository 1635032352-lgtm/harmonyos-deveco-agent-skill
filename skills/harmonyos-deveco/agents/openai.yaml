interface:
  display_name: "HarmonyOS Ideal Builder"
  short_description: "Turn ideal HarmonyOS product ideas into validated ArkUI/DevEco apps"
  default_prompt: "Use $harmonyos-deveco for HarmonyOS / DevEco product realization. Prefer the smallest slash checkpoint first: /harmonyos-ideal, /harmonyos-ux, /harmonyos-system, /harmonyos-arkui, /harmonyos-implement, /harmonyos-verify, or /harmonyos-report; use /harmonyos-all only when the user wants the whole path."

policy:
  allow_implicit_invocation: true

activation:
  use_when:
    - "The user wants to design a HarmonyOS app, page, interface, interaction, information architecture, or product flow."
    - "The user describes an ideal software feeling and wants Codex to make it concrete."
    - "The user asks Codex to capture product temperament, visual direction, user context, and usage scene before writing ArkTS."
    - "The user says not to jump straight into code and wants product feeling, information architecture, UI direction, and implementation plan first."
    - "The user wants a UI plan, screenshot, design system, or text description translated into ArkUI/ArkTS."
    - "The user provides a screenshot, design mock, written UI idea, staged prompt file, or completion report and wants it converted into a HarmonyOS page, component, route, or runnable DevEco project."
    - "The user wants to combine brainstorming, UI/UX design, visual QA, and HarmonyOS implementation."
    - "The user asks to improve the visual quality, interaction, architecture, build, signing, permissions, routes, resources, or device readiness of a HarmonyOS / DevEco project."
    - "The user asks for exact HarmonyOS visual validation, screenshots, DevEco Preview checks, viewport checks, or device evidence."
    - "The user wants to avoid jumping straight into ArkTS before product feeling, information architecture, design tokens, and verification gates are clear."
    - "The user wants Codex to act as a product-realization partner for a HarmonyOS app, turning fuzzy ideal-software intent into concrete ArkUI implementation and DevEco validation evidence."
    - "The user asks for a single path from brainstorming or UI/UX design system to ArkUI tokens, ArkTS components, hvigor build, signed HAP, or device/Preview evidence."
    - "The user provides staged prompt files, window reports, or phase labels for HarmonyOS product, UI, build, signing, QA, or device-verification work."
  trigger_phrases:
    - "/harmonyos-ideal"
    - "/harmonyos-ux"
    - "/harmonyos-system"
    - "/harmonyos-arkui"
    - "/harmonyos-implement"
    - "/harmonyos-verify"
    - "/harmonyos-report"
    - "/harmonyos-fix"
    - "/harmonyos-contest"
    - "/harmonyos-all"
    - "产品理想设计 + HarmonyOS 落地"
    - "用 ui-ux-pro-max + gstack + superpowers + harmonyos-deveco 做 HarmonyOS 产品"
    - "从 brainstorming 到 ArkUI 实现和 DevEco 验证"
    - "帮我把脑海中的软件设计出来"
    - "帮我设计 HarmonyOS 软件界面"
    - "把这个 UI 方案落到 ArkUI"
    - "用 ArkTS 实现这个产品页面"
    - "帮我把 ideal 软件变成可运行 HarmonyOS 项目"
    - "优化这个 HarmonyOS 应用的界面质感、交互和架构"
    - "DevEco 提交级交付复查"
    - "先帮我澄清产品气质再落 ArkUI"
    - "ideal 软件落地 HarmonyOS"
    - "HarmonyOS 产品感觉设计"
    - "把我脑海里的产品感觉做成 HarmonyOS 应用"
    - "从产品想法到 DevEco 可运行项目"
    - "把截图或设计稿转成 ArkUI"
    - "让这个 HarmonyOS 页面更像高质量产品"
    - "脑海中的 ideal 软件"
    - "把产品感觉落到 ArkUI tokens 和组件"
    - "从 UI/UX 设计系统到 DevEco 构建验证"
    - "捕捉我的产品感觉并落到 HarmonyOS"
    - "先设计产品气质再写 ArkTS"
    - "把模糊想法变成 ArkUI 页面和组件"
    - "先帮我想清楚产品再做 HarmonyOS"
    - "把理想产品感觉变成可运行 HarmonyOS 应用"
    - "从脑海中的软件到 ArkUI tokens"
    - "把产品气质、目标用户和使用场景落到 DevEco 项目"
