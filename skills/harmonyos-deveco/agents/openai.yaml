  default_flow: "/harmonyos-ideal -> /harmonyos-ux -> /harmonyos-system -> /harmonyos-arkui -> /harmonyos-implement -> /harmonyos-verify -> /harmonyos-report"
  companion_skills:
    - "superpowers: brainstorming, spec, plan, TDD, verification discipline"
    - "ui-ux-pro-max: UI/UX design system, interaction quality, accessibility, visual polish"
    - "gstack: visual QA, screenshots, responsive checks, regression evidence when applicable"




